name: Build and Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Extract version from tag
        id: version
        run: echo "version=${GITHUB_REF_NAME#v}" >> "$GITHUB_OUTPUT"

      - name: Set package variables
        id: pkg
        run: |
          PLUGIN_VER="${{ steps.version.outputs.version }}"
          echo "plugin_pkg=claude-code-${PLUGIN_VER}-x86_64-1.txz" >> "$GITHUB_OUTPUT"

      - name: Prepare plugin staging
        run: |
          mkdir -p build/plugin-staging
          cp -a source/* build/plugin-staging/

      - name: Fix staging directory ownership
        run: |
          sudo chown -R root:root build/plugin-staging
          sudo chmod 755 build/plugin-staging

      - name: Build package
        run: |
          docker run --rm \
            -v "${{ github.workspace }}/build:/build" \
            vbatts/slackware:current \
            bash -c "
              chown root:root /build/plugin-staging
              chmod 755 /build/plugin-staging
              cd /build/plugin-staging && makepkg -l y -c n /build/${{ steps.pkg.outputs.plugin_pkg }}
            "

      - name: Compute checksum
        id: md5
        run: |
          PLUGIN_MD5=$(md5sum "build/${{ steps.pkg.outputs.plugin_pkg }}" | cut -d' ' -f1)
          echo "plugin_md5=${PLUGIN_MD5}" >> "$GITHUB_OUTPUT"
          echo "Plugin MD5: ${PLUGIN_MD5}"

      - name: Patch .plg with checksum and version
        run: |
          sed -i 's/<!ENTITY version     "[^"]*">/<!ENTITY version     "${{ steps.version.outputs.version }}">/' claude-code.plg
          sed -i 's/<!ENTITY plugin_md5  "[^"]*">/<!ENTITY plugin_md5  "${{ steps.md5.outputs.plugin_md5 }}">/' claude-code.plg

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          name: v${{ steps.version.outputs.version }}
          body: |
            ## Claude Code for Unraid — v${{ steps.version.outputs.version }}

            ### Package
            - `${{ steps.pkg.outputs.plugin_pkg }}`

            ### Install
            Add this URL in Unraid under **Plugins > Install Plugin**:
            ```
            https://raw.githubusercontent.com/McBrideMusings/unraid-claude-code/main/claude-code.plg
            ```
          files: |
            build/${{ steps.pkg.outputs.plugin_pkg }}

      - name: Update .plg on main branch
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git fetch origin main
          git checkout main
          git add claude-code.plg
          git commit -m "Update checksum for v${{ steps.version.outputs.version }}"
          git push origin main
